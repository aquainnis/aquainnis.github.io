name: Publish dev branch to /preview

# Pushes to dev are copied into main's preview/ folder (with noindex
# forced on every page). The normal GitHub Pages branch build on main
# then serves it at https://aquainnis.com/preview/
#
# main itself deploys exactly as before: plain GitHub Pages from branch.

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preview
  cancel-in-progress: true

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: site

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: devsrc

      - name: Rebuild preview/ from dev
        run: |
          rm -rf site/preview
          mkdir -p site/preview
          rsync -a --exclude '.git' --exclude '.github' --exclude 'preview' devsrc/ site/preview/

      - name: Force noindex on all preview pages
        run: |
          find site/preview -name '*.html' | while read -r f; do
            if grep -qi 'name="robots"' "$f"; then
              sed -i -E 's/<meta name="robots" content="[^"]*"[^>]*>/<meta name="robots" content="noindex, nofollow">/Ig' "$f"
            else
              sed -i 's/<head>/<head><meta name="robots" content="noindex, nofollow">/I' "$f"
            fi
          done

      - name: Commit preview to main
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview
          if git diff --cached --quiet; then
            echo "Preview unchanged; nothing to commit."
          else
            git commit -m "Update /preview from dev ($GITHUB_SHA)"
            git push origin main
          fi
